apiVersion: apps/v1
kind: Deployment
metadata:
  name: practice-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: practice
  template:
    metadata:
      labels:
        app: practice
    spec:
      containers:
      - name: nginx
        image: nginx:1.25.3
        ports:
        - containerPort: 80
